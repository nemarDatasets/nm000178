abstract: Reaching and grasping is an essential part of everybody's life, it allows meaningful interaction with the environment
  and is key to independent lifestyle. Recent electroencephalogram (EEG)-based studies have already shown that neural correlates
  of natural reach-and-grasp actions can be identified in the EEG. However, it is still in question whether these results
  obtained in a laboratory environment can make the transition to mobile applicable EEG systems for home use. In the current
  study, we investigated whether EEG-based correlates of natural reach-and-grasp actions can be successfully identified and
  decoded using mobile EEG systems, namely the water-based EEG-Versatile system and the dry-electrodes EEG-Hero headset. In
  addition, we also analyzed gel-based recordings obtained in a laboratory environment (g.USBamp/g.Ladybird, gold standard),
  which followed the same experimental parameters. For each recording system, 15 study participants performed 80 self-initiated
  reach-and-grasp actions toward a glass (palmar grasp) and a spoon (lateral grasp). Our results confirmed that EEG-based
  correlates of reach-and-grasp actions can be successfully identified using these mobile systems. In a single-trial multiclass-based
  decoding approach, which incorporated both movement conditions and rest, we could show that the low frequency time domain
  (LFTD) correlates were also decodable. Grand average peak accuracy calculated on unseen test data yielded for the water-based
  electrode system 62.3% (9.2% STD), whereas for the dry-electrodes headset reached 56.4% (8% STD). For the gel-based electrode
  system 61.3% (8.6% STD) could be achieved. To foster and promote further investigations in the field of EEG-based movement
  decoding, as well as to allow the interested community to make their own conclusions, we provide all datasets publicly available
  in the BNCI Horizon 2020 database.
