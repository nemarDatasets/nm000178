  notes: Preprocessing applied during analysis, not to raw data. For gel-based and water-based recordings, extended infomax
    ICA algorithm was applied on all available EEG and EOG channels. ICA was not applied to dry-electrode recordings due to
    unfavorable number of channels (n=11).
  preprocessing_steps:
  - zero-phase 4th order Butterworth bandpass filter (0.3-60 Hz)
  - extended infomax ICA for eye artifact removal
  - artifact rejection by amplitude threshold (>125 µV)
  - artifact rejection by abnormal joint probability (4 SD threshold)
  - artifact rejection by abnormal kurtosis (4 SD threshold)
  re_reference: CAR
